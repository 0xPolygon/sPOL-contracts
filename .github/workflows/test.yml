name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: |
          forge --version

      - name: Install dependencies
        run: |
          forge soldeer install

      - name: Run Forge fmt
        run: |
          forge fmt --check
        id: fmt

      - name: Run Forge build
        run: |
          forge build --sizes
        id: build

      - name: Run Forge tests
        env:
          L1_RPC_URL: ${{ vars.L1_RPC_URL }}
          L2_RPC_URL: ${{ vars.L2_RPC_URL }}
        # `test/upgrades/` holds fork tests that fork pre-upgrade mainnet state and run 
        # migrations in-place. Once the upgrade lands on mainnet they will
        # start failing.
        run: |
          forge test -vvv --no-match-path "test/upgrades/*"
        id: test

